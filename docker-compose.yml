services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/app.db
      SECRET_KEY: ${SECRET_KEY:-please-change-this-to-a-random-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@techkraft.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - backend_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
